<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login/Signup Flow</title>
    <link rel="stylesheet" href="/public/css/login_signup.css">
</head>
<body>

    <button class="trigger-btn" onclick="openModal()">Mở Đăng Nhập</button>

    <div class="overlay" id="overlay">
        <div class="modal" id="mainModal">
            
            <button id="back-btn" class="back-btn" onclick="switchView('view-general')">&lt; Back</button>
            <span class="close-btn" id="close-btn" onclick="closeModal()">×</span>

            <div class="view" id="view-general">
                <div class="v1-left">
                    <h2>Welcome to App</h2>
                    <button class="btn-large primary" onclick="switchView('view-login')">Đăng nhập</button>
                    <button class="btn-large" onclick="switchView('view-signup')">Đăng ký</button>
                </div>
                <div class="v1-right">
                    <div class="methods-grid">
                        <button class="method-btn">🔵 Facebook</button>
                        <button class="method-btn">🔴 Google</button>
                        <button class="method-btn">⚫ Github</button>
                        <button class="method-btn">🟣 Discord</button>
                        <button class="method-btn" style="grid-column: span 2;">👤 Guest (Khách)</button>
                        <div class="guest-inputs">
                            <input type="text" placeholder="Tên hiển thị">
                            <input type="text" placeholder="Username">
                        </div>
                    </div>
                    
                    <div class="dev-links">
                        <p>Kết nối với Developer</p>
                        <div class="social-icons">
                            <a href="#">Fb</a>
                            <a href="#">Git</a>
                            <a href="#">In</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="view form-view" id="view-login">
                <div class="header-graphic"></div>
                <h2 class="form-title">Welcome back</h2>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="example@gmail.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••••">
                </div>
                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>
                <button class="submit-btn">Sign in</button>
                
                <p class="social-login-text">Sign in with</p>
                <div class="social-icons-form">
                    <a href="#">f</a> <a href="#">G</a> <a href="#"></a>
                </div>
                
                <p class="toggle-form-text">Don't have an account? <span onclick="switchView('view-signup')">Sign up</span></p>
            </div>

            <div class="view form-view" id="view-signup">
                <div class="header-graphic"></div>
                <h2 class="form-title">Get Started</h2>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter Full Name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter Email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter Password">
                </div>
                <div class="form-options">
                    <label><input type="checkbox"> I agree to the processing of <b>Personal data</b></label>
                </div>
                <button class="submit-btn">Sign up</button>
                
                <p class="social-login-text">Sign up with</p>
                <div class="social-icons-form">
                    <a href="#">f</a> <a href="#">G</a> <a href="#"></a>
                </div>
                
                <p class="toggle-form-text">Already have an account? <span onclick="switchView('view-login')">Sign in</span></p>
            </div>

        </div>
    </div>

    <script src="/public/js/login_signup.js"></script>
</body>
</html>
